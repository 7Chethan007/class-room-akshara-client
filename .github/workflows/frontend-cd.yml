name: Frontend CD
on:
  workflow_run:
    workflows: [ "Frontend CI" ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Create docker network if it doesn't exist
            docker network create akshara-net || true
            
            IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:${{ github.event.workflow_run.head_commit.id }}
            docker pull $IMAGE || docker pull ${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:latest
            docker stop akshara-frontend || true
            docker rm akshara-frontend || true
            docker run -d \
              --name akshara-frontend \
              --network akshara-net \
              -p ${EC2_FRONTEND_PORT:-80}:3000 \
              $IMAGE
