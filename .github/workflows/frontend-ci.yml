name: Frontend CI
on:
  push:
    branches: [ "main" ]
    paths:
      - "client/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:latest \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/akshara-frontend:${{ github.sha }}
